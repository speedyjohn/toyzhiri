spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/toyzhiri
    username: username
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  config:
    import: optional:classpath:application-local.yml
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}


server:
  port: 8080

app:
  jwt:
    secret: key
    expiration-ms: 86400000
  upload:
    dir: uploads
    max-size: 5242880
  mail:
    from: noreply@toyzhiri.kz
    enabled: false